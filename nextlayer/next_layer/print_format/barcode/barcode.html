<style>
    .print-format {
        width: 5cm;
        height: 10cm;
        padding: 4px;
        border: 0.5px dashed #888;
        box-sizing: border-box;
    }

    @page {
        size: 5cm 10cm;
        margin: 0;
    }

    body {
        font-family: Arial, sans-serif;
        font-size: 10px;
        margin: 0;
        padding: 0;
    }

    .container {
        width: 100%;
        text-align: center;
        padding: 3px;
        box-sizing: border-box;
    }

    .title {
        font-size: 10px;
        margin: 4px 0;
        text-transform: uppercase;
        word-wrap: break-word;
    }

    .info {
        text-align: center;
        margin: 2px 0;
        line-height: 1.2;
        font-size: 9px;
    }

    .barcode img {
        width: 100%;
        max-height: 5cm;
        object-fit: contain;
        margin: 3px 0;
    }

    .footer {
        text-align: center;
        font-weight: bold;
        font-size: 9px;
        text-transform: uppercase;
        margin-top: 4px;
    }
</style>

<div class="print-format">
    <div class="container">

        <div class="info">
            <div>MRK - R.M.D</div>
            <div>M/C-3</div>
            <div>ART-RYL-AIR</div>
            <div class="title">{{ doc.item_name }}</div>
        </div>

        {% set barcode = frappe.db.get_all(
            "Item Barcode",
            filters={"parent": doc.name},
            fields=["custom_image"],
            limit=1
        ) %}

        {% if barcode and barcode[0].custom_image %}
            <div class="barcode">
                <img src="{{ barcode[0].custom_image }}">
            </div>
        {% else %}
            <div class="barcode">
                <p>No barcode available</p>
            </div>
        {% endif %}

        <div class="footer">Made in India</div>
    </div>
</div>
